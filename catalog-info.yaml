apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: thoughts-dashboard
  description: A Flask web dashboard for viewing thoughts database reporting with admin SQL query interface
  annotations:
    # GitHub repository
    github.com/project-slug: arunhari82/intern-use-case-demo-full

    # Kubernetes deployment
    backstage.io/kubernetes-id: thoughts-dashboard
    backstage.io/kubernetes-namespace: thoughts-app

    # Container image
    quay.io/repository-slug: quayadmin/thoughts-dashboard

    # Documentation
    backstage.io/techdocs-ref: dir:.
  tags:
    - flask
    - python
    - dashboard
    - postgresql
    - database
    - reporting
  links:
    - url: https://github.com/arunhari82/intern-use-case-demo-full
      title: GitHub Repository
      icon: github
    - url: https://github.com/arunhari82/intern-use-case-demo-full/blob/main/README.md
      title: Documentation
      icon: docs
    - url: https://github.com/arunhari82/intern-use-case-demo-full/blob/main/DEPLOYMENT.md
      title: Deployment Guide
      icon: catalog
spec:
  type: service
  lifecycle: production
  owner: team-platform
  system: thoughts-app
  providesApis: []
  consumesApis: []
  dependsOn:
    - resource:default/thoughts-postgresql
relations:
  - type: ownedBy
    targetRef: group:default/user1   
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: thoughts-postgresql
  description: PostgreSQL database for thoughts application
  annotations:
    backstage.io/kubernetes-id: postgresql
    backstage.io/kubernetes-namespace: thoughts-app
  tags:
    - postgresql
    - database
spec:
  type: database
  lifecycle: production
  owner: user1
  system: thoughts-app
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: thoughts-app
  description: Thoughts application system including dashboard and database
  tags:
    - flask
    - postgresql
    - dashboard
spec:
  owner: user1